{% extends 'base.html' %}
{% block title %}{{ view.object|default:"Nuevo" }} - Reloj{% endblock %}
{% block content %}
<h2 class="mb-4">{% if view.object %}Editar{% else %}Nuevo{% endif %} Reloj</h2>
<form method="post" class="needs-validation" novalidate>
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Guardar</button>
  <a href="{% url 'producto-list' %}" class="btn btn-secondary ms-2">Cancelar</a>
</form>
{% endblock %}
