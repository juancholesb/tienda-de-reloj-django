{% extends 'base.html' %}
{% block title %}Nuevo Reloj{% endblock %}
{% block content %}
<h1 class="mb-4">Crear Reloj</h1>
<form method="post" class="row g-3">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{% url 'producto-list' %}" class="btn btn-secondary ms-2">Cancelar</a>
    </div>
</form>
{% endblock %}
